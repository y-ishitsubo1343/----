<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>料理日記 - BeReal Style</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>料理日記</h1>
</header>

<main>

    <!-- 投稿フォーム -->
    <section id="post-form">
        <h2>新しい料理を記録する</h2>

        <form id="postForm">

            <div>
                <label for="image">写真：</label>
                <input type="file" id="image" accept="image/*">
            </div>

            <div>
                <label for="dish-name">料理名：</label>
                <input type="text" id="dish-name" placeholder="例：肉じゃが" required>
            </div>

            <div>
                <label for="feedback">感想：</label>
                <textarea id="feedback" rows="3" placeholder="味やコツなど"></textarea>
            </div>

            <button type="submit" id="submitBtn">投稿する</button>

        </form>
    </section>

    <hr>

    <!-- 最新投稿 -->
    <section id="latest-post">
        <h2>最新の投稿</h2>
        <article></article>
    </section>

    <hr>

    <!-- 過去投稿 -->
    <section id="past-posts">
        <h2>過去の投稿</h2>
        <div class="post-grid"></div>
    </section>

</main>

<footer>
    <p>&copy; 2026 料理日記</p>
</footer>


<!-- =========================
     編集モーダル（ここが正解位置）
========================= -->
<div id="editModal" class="modal">

    <div class="modal-content">

        <h2>料理を編集</h2>

        <input type="text" id="editDishName" placeholder="料理名">
        <textarea id="editFeedback" placeholder="感想"></textarea>

        <div class="modal-buttons">
            <button id="saveEditBtn">保存</button>
            <button id="closeModalBtn">閉じる</button>
        </div>

    </div>

</div>


<script src="script.js"></script>

</body>
</html>
