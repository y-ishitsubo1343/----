<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>料理日記 - BeReal Style</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="header-content" style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
        <h1>
            <svg class="hand-icon" viewBox="0 0 24 24">
                <path d="M5 10c0 4 3 7 7 7s7-3 7-7H5zM19 11h2c1 0 2 1 2 2s-1 2-2 2h-2M4 19h16" stroke-width="1.5" stroke="currentColor" fill="none" stroke-linecap="round"/>
            </svg>
            <span id="appTitle">my recipe log</span>
        </h1>
        <button id="settingsBtn" class="icon-btn" style="background: none; border: none; padding: 5px; cursor: pointer; color: var(--text-secondary);">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </button>
    </div>
</header>

<main>
    <div class="dashboard">
        <div class="left-panel">
            <!-- 最新投稿（上半分） -->
            <section id="latest-post">
                <article>
                    <h2>
                        Today 
                        <svg class="hand-icon" viewBox="0 0 24 24" style="margin-left: 5px;">
                            <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4l1.4-1.4M17 7l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </h2>
                    <div class="content-body"></div>
                </article>
            </section>

            <hr>

            <!-- 投稿フォーム（下半分） -->
            <section id="post-form">
                <h2>
                    Record 
                    <svg class="hand-icon" viewBox="0 0 24 24" style="margin-left: 5px;">
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L7 20l-4 1 1-4L18.5 2.5z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M15 5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </h2>

                <form id="postForm">

                    <div>
                        <label for="image">写真：</label>
                        <input type="file" id="image" accept="image/*">
                    </div>

                    <div>
                        <label for="dish-name">料理名：</label>
                        <input type="text" id="dish-name" placeholder="例：肉じゃが" required>
                    </div>

                    <div>
                        <label for="feedback">感想：</label>
                        <textarea id="feedback" rows="3" placeholder="味やコツなど"></textarea>
                    </div>

                    <!-- 日付追加 -->
                    <div>
                        <label for="post-date">日付：</label>
                        <input type="date" id="post-date">
                    </div>

                    <button type="submit" id="submitBtn">投稿する</button>

                </form>
            </section>
        </div>

        <div class="right-panel">
            <div class="tabs">
                <button class="tab-btn active" data-tab="calendar-tab">カレンダー</button>
                <button class="tab-btn" data-tab="history-tab">履歴</button>
            </div>

            <div id="calendar-tab" class="tab-content active">
                <div class="calendar-container">
                    <div class="calendar-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <button id="prevMonth" style="padding: 5px 10px; background: none; color: var(--text-primary); border: 1px solid #ddd;">&lt;</button>
                        <h3 id="calendar-month" style="margin: 0;">2026年 5月</h3>
                        <button id="nextMonth" style="padding: 5px 10px; background: none; color: var(--text-primary); border: 1px solid #ddd;">&gt;</button>
                    </div>
                    <div class="calendar-grid" id="calendarGrid">
                        <!-- カレンダーがここに生成される -->
                    </div>
                </div>
            </div>

            <div id="history-tab" class="tab-content">
                <div class="calendar-container">
                    <h3>過去の投稿一覧</h3>
                    <div id="past-posts">
                        <div class="post-grid"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 料理日記</p>
</footer>

<!-- 編集モーダル -->
<div id="editModal" class="modal">

    <div class="modal-content">

        <h2>料理を編集</h2>

        <img id="editImagePreview" src="" alt="料理写真" style="width: 100%; border-radius: 8px; margin-bottom: 15px; aspect-ratio: 1/1; object-fit: cover;">

        <input type="text" id="editDishName" placeholder="料理名">
        <textarea id="editFeedback" placeholder="感想" rows="3" style="width: 100%; margin-top: 10px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit;"></textarea>

        <div class="modal-buttons" style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="saveEditBtn" style="flex: 1;">保存</button>
            <button id="deleteEditBtn" style="flex: 1; background: #fff0f0; color: #dc3545;">削除</button>
            <button id="closeModalBtn" style="flex: 1; background: #f0f0f0; color: var(--text-primary);">閉じる</button>
        </div>

    </div>

</div>

<!-- 設定モーダル -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h2>アプリ設定</h2>
        
        <div style="margin-bottom: 20px;">
            <label for="appNameInput">アプリのタイトル：</label>
            <input type="text" id="appNameInput" placeholder="例：my recipe log">
        </div>

        <div style="margin-bottom: 20px;">
            <h3>データ管理</h3>
            <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 10px;">
                投稿データはブラウザに保存されています。別のデバイスで見たい場合は、書き出したファイルを読み込んでください。
            </p>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button id="exportBtn" style="background: var(--accent-color);">データをファイルに書き出す</button>
                <button id="importTriggerBtn" style="background: var(--text-secondary);">ファイルからデータを読み込む</button>
                <input type="file" id="importFile" style="display: none;" accept=".json">
                <button id="resetDataBtn" style="background: #fff0f0; color: #dc3545;">すべてのデータをリセット</button>
            </div>
        </div>

        <div class="modal-buttons" style="margin-top: 20px;">
            <button id="closeSettingsBtn" style="width: 100%; background: #f0f0f0; color: var(--text-primary);">閉じる</button>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
